        { id: "PERIODIC_06", topic: "Periodic Table", text: "Down Group 1, reactivity:", options: ["Increases", "Decreases", "Stays the same", "Varies"], correct: "A", explanation: "Reactivity increases down Group 1.", xp: 15, hint: "Potassium more reactive than sodium." },
        { id: "PERIODIC_07", topic: "Periodic Table", text: "Which property do transition metals share?", options: ["Form colourless compounds", "Low melting points", "Variable oxidation states", "Do not conduct electricity"], correct: "C", explanation: "Transition metals can form ions with different charges.", xp: 15, hint: "Iron can be Fe²⁺ or Fe³⁺." },
        { id: "PERIODIC_08", topic: "Periodic Table", text: "Which element is least reactive in Group 1?", options: ["Lithium", "Sodium", "Potassium", "Rubidium"], correct: "A", explanation: "Reactivity increases down Group 1.", xp: 15, hint: "Top of group = least reactive." },
        { id: "PERIODIC_09", topic: "Periodic Table", text: "Elements in the same group have the same number of:", options: ["Protons", "Neutrons", "Electron shells", "Valence electrons"], correct: "D", explanation: "Group number = number of outer electrons.", xp: 15, hint: "Outer shell electrons." },
        { id: "PERIODIC_10", topic: "Periodic Table", text: "Which element is a transition metal?", options: ["Calcium", "Copper", "Aluminium", "Silicon"], correct: "B", explanation: "Transition metals are in the middle block.", xp: 10, hint: "Forms coloured compounds." },
        { id: "PERIODIC_11", topic: "Periodic Table", text: "Which statement about the halogens (Group 17) as oxidising agents is correct?", options: ["Fluorine is the weakest oxidising agent", "Oxidising strength increases down the group", "Iodine is the strongest oxidising agent", "Oxidising strength decreases down the group"], correct: "D", explanation: "Fluorine is the strongest oxidising agent. Oxidising power decreases down the group because atoms get larger and attract electrons less strongly.", xp: 20, hint: "Think about atomic size and electron attraction." },
        { id: "PERIODIC_12", topic: "Periodic Table", text: "Which element in Group 1 has the highest melting point?", options: ["Lithium", "Sodium", "Potassium", "Francium"], correct: "A", explanation: "Melting point decreases down Group 1 as metallic bonding weakens. Lithium has the highest melting point.", xp: 15, hint: "Top of group." },
        { id: "PERIODIC_13", topic: "Periodic Table", text: "Which halogen has the highest boiling point?", options: ["Fluorine", "Chlorine", "Bromine", "Iodine"], correct: "D", explanation: "Boiling point increases down Group 17 due to stronger van der Waals forces. Iodine has the highest.", xp: 15, hint: "Bottom of group." },
        { id: "PERIODIC_14", topic: "Periodic Table", text: "What is the trend in atomic radius across a period (left to right)?", options: ["Increases", "Decreases", "Stays the same", "Varies randomly"], correct: "B", explanation: "Atomic radius decreases across a period due to increasing nuclear charge pulling electrons closer.", xp: 15, hint: "More protons pull electrons in." },
        { id: "PERIODIC_15", topic: "Periodic Table", text: "What is the trend in melting point across Period 2 (from lithium to neon)?", options: ["Increases across the period", "Decreases across the period", "Increases then decreases sharply", "Stays constant"], correct: "C", explanation: "Melting point increases from Li to C (giant covalent), then decreases sharply for N₂, O₂, F₂, Ne (simple molecular).", xp: 20, hint: "Giant covalent vs simple molecular." },
        { id: "PERIODIC_16", topic: "Periodic Table", text: "Which group contains elements that are all gases at room temperature?", options: ["Group 1", "Group 17", "Group 18", "Group 2"], correct: "C", explanation: "Noble gases (Group 18) are all monatomic gases at room temperature.", xp: 10, hint: "Unreactive gases." },
        { id: "PERIODIC_17", topic: "Periodic Table", text: "Which transition metal is used as a catalyst in the Haber process?", options: ["Iron", "Copper", "Nickel", "Platinum"], correct: "A", explanation: "Iron is the catalyst used in the Haber process to produce ammonia from nitrogen and hydrogen.", xp: 15, hint: "Ammonia production." },
        { id: "PERIODIC_18", topic: "Periodic Table", text: "What colour is chlorine gas at room temperature?", options: ["Greenish-yellow", "Red-brown", "Colourless", "Purple"], correct: "A", explanation: "Chlorine gas is greenish-yellow. Bromine is red-brown liquid, iodine is purple solid.", xp: 10, hint: "Halogen colours." },
        { id: "PERIODIC_19", topic: "Periodic Table", text: "Which statement about Group 1 elements is correct?", options: ["They all float on water", "Reactivity decreases down the group", "They form +2 ions", "They are all soft metals"], correct: "D", explanation: "Group 1 metals (alkali metals) are all soft and can be cut with a knife.", xp: 15, hint: "Soft enough to cut." },
        { id: "PERIODIC_20", topic: "Periodic Table", text: "What is the outer electronic configuration of elements in Group 17?", options: ["ns¹", "ns²", "ns²np⁵", "ns²np⁶"], correct: "C", explanation: "Halogens have 7 valence electrons: ns²np⁵.", xp: 15, hint: "One electron short of noble gas." }
    ];

    // ==================== BADGES (16 badges with tooltips) ====================
    const BADGES = [
        { id: "first_correct", name: "🎉 First Step", description: "Answer your first question correctly", icon: "🎉", tooltip: "Answer your first question correctly" },
        { id: "streak_5", name: "🔥 Fire Starter", description: "Get 5 correct answers in a row", icon: "🔥", tooltip: "Get 5 correct answers in a row" },
        { id: "streak_10", name: "⚡ Unstoppable", description: "Get 10 correct answers in a row", icon: "⚡", tooltip: "Get 10 correct answers in a row" },

        { id: "heart_of_gold", name: "💛 Heart of Gold", description: "Answer 50 total correct answers", icon: "💛", tooltip: "Answer 50 total correct answers" },

        { id: "topic_master", name: "📚 Topic Master", description: "Complete all questions in any topic", icon: "📚", tooltip: "Complete all 20 questions in any single topic" },

        { id: "master_of_molecules", name: "🧪 Master of Molecules", description: "Complete ALL 220 questions", icon: "🧪", tooltip: "Complete every single question in ChemMaster — ULTIMATE ACHIEVEMENT!" }
    ];

    const TITLES = [
        { minXP: 0, title: "🥉 Bronze Scholar" },
        { minXP: 200, title: "🥈 Silver Scholar" },
        { minXP: 500, title: "🥇 Gold Graduate" },
        { minXP: 1000, title: "💎 Platinum Pro" },
        { minXP: 2000, title: "🔮 Diamond Dominator" }
    ];

    // ==================== STORAGE FUNCTIONS ====================
    function getHearts() { return parseInt(localStorage.getItem("chem_hearts") || "5"); }
    function setHearts(val) { localStorage.setItem("chem_hearts", Math.min(5, Math.max(0, val))); render(); }
    function getXP() { return parseInt(localStorage.getItem("chem_xp") || "0"); }
    function addXP(amount) { let newXP = getXP() + amount; localStorage.setItem("chem_xp", newXP); checkXPBadges(newXP); return newXP; }
    function spendXP(cost) { if (getXP() >= cost) { addXP(-cost); return true; } return false; }
    function getStreak() { return parseInt(localStorage.getItem("chem_streak") || "0"); }
    function setStreak(val) { localStorage.setItem("chem_streak", val); checkStreakBadges(val); }
    function getCompleted() { return JSON.parse(localStorage.getItem("chem_completed") || "{}"); }
    function setCompleted(qId, topic) { let map = getCompleted(); map[`${qId}_${topic}`] = true; localStorage.setItem("chem_completed", JSON.stringify(map)); checkAllQuestionsComplete(); }
    function isCompleted(qId, topic) { return !!getCompleted()[`${qId}_${topic}`]; }
    function getUnlockedBadges() { return JSON.parse(localStorage.getItem("chem_badges") || "[]"); }
    function unlockBadge(badgeId) { let unlocked = getUnlockedBadges(); if (!unlocked.includes(badgeId)) { unlocked.push(badgeId); localStorage.setItem("chem_badges", JSON.stringify(unlocked)); showPrizeModal(badgeId); return true; } return false; }

    // Shop tracking
    let totalXPSpent = parseInt(localStorage.getItem("chem_xp_spent") || "0");
    let totalHintsBought = parseInt(localStorage.getItem("chem_hints_bought") || "0");
    let totalHeartsLost = parseInt(localStorage.getItem("chem_hearts_lost") || "0");
    let totalCorrectAnswers = parseInt(localStorage.getItem("chem_correct_total") || "0");
    let totalQuestionsAnswered = parseInt(localStorage.getItem("chem_questions_answered") || "0");
    let topicsPerfected = JSON.parse(localStorage.getItem("chem_topics_perfected") || "[]");

    function recordXPSpent(amount) { totalXPSpent += amount; localStorage.setItem("chem_xp_spent", totalXPSpent); checkBigSpender(); }
    function recordHintBought() { totalHintsBought++; localStorage.setItem("chem_hints_bought", totalHintsBought); checkHintHoarder(); }
    function recordHeartLoss() { totalHeartsLost++; localStorage.setItem("chem_hearts_lost", totalHeartsLost); checkNeverGiveUp(); }
    function recordCorrectAnswer() { totalCorrectAnswers++; localStorage.setItem("chem_correct_total", totalCorrectAnswers); checkHeartOfGold(); checkProfessor(); }
    function recordQuestionAnswered() { totalQuestionsAnswered++; localStorage.setItem("chem_questions_answered", totalQuestionsAnswered); checkProfessor(); }

    function checkHeartOfGold() { if (totalCorrectAnswers >= 50) unlockBadge("heart_of_gold"); }
    function checkNeverGiveUp() { if (totalHeartsLost >= 20) unlockBadge("never_give_up"); }
    function checkBigSpender() { if (totalXPSpent >= 200) unlockBadge("big_spender"); }
    function checkHintHoarder() { if (totalHintsBought >= 10) unlockBadge("hint_hoarder"); }
    function checkProfessor() { if (totalQuestionsAnswered >= 100 && (totalCorrectAnswers / totalQuestionsAnswered) >= 0.9) unlockBadge("professor"); }
    function checkFlawlessVictory() { if (topicsPerfected.length >= 3) unlockBadge("flawless_victory"); }
    function recordPerfectedTopic(topic) { if (!topicsPerfected.includes(topic)) { topicsPerfected.push(topic); localStorage.setItem("chem_topics_perfected", JSON.stringify(topicsPerfected)); checkFlawlessVictory(); } }

    function saveCurrentIndex(topic, index) {
        let indexes = JSON.parse(localStorage.getItem("chem_topic_indexes") || "{}");
        indexes[topic] = index;
        localStorage.setItem("chem_topic_indexes", JSON.stringify(indexes));
    }
    function getSavedIndex(topic) {
        let indexes = JSON.parse(localStorage.getItem("chem_topic_indexes") || "{}");
        return indexes[topic] || 0;
    }

    let doubleXPActive = false;
    let doubleXPQuestionsLeft = 0;

    function activateDoubleXP() {
        if (spendXP(50)) {
            doubleXPActive = true;
            doubleXPQuestionsLeft = 5;
            alert("⚡ DOUBLE XP ACTIVATED! Next 5 questions give 2× XP! ⚡");
            render();
        } else { alert("Not enough XP! Need 50 XP for Double XP power-up."); }
    }

    function getMultiplier() { return (doubleXPActive && doubleXPQuestionsLeft > 0) ? 2 : 1; }
    function consumeDoubleXP() {
        if (doubleXPActive && doubleXPQuestionsLeft > 0) {
            doubleXPQuestionsLeft--;
            if (doubleXPQuestionsLeft === 0) { doubleXPActive = false; alert("✨ Double XP power-up expired! ✨"); }
            render();
        }
    }

    function checkAllQuestionsComplete() {
        if (QUESTION_SET.every(q => isCompleted(q.id, q.topic))) unlockBadge("master_of_molecules");
    }
    function checkXPBadges(xp) { if (xp >= 500) unlockBadge("xp_500"); if (xp >= 1000) unlockBadge("xp_1000"); if (xp >= 2000) unlockBadge("xp_2000"); }
    function checkStreakBadges(streak) { if (streak >= 5) unlockBadge("streak_5"); if (streak >= 10) unlockBadge("streak_10"); }
    function checkFirstCorrect() { unlockBadge("first_correct"); }
    function checkTopicMaster(topic, qlist) { if (qlist.every(q => isCompleted(q.id, topic))) unlockBadge("topic_master"); }
    function checkPerfectTopic(topic, qlist, hadWrong) {
        if (!hadWrong && qlist.every(q => isCompleted(q.id, topic))) {
            unlockBadge("perfectionist");
            recordPerfectedTopic(topic);
        }
    }

    function getNextTitleInfo() {
        let xp = getXP();
        for (let i = 0; i < TITLES.length; i++) {
            if (xp < TITLES[i].minXP) {
                let needed = TITLES[i].minXP - xp;
                return { currentTitle: i > 0 ? TITLES[i-1].title : "None", nextTitle: TITLES[i].title, xpNeeded: needed };
            }
        }
        return { currentTitle: TITLES[TITLES.length-1].title, nextTitle: "MAX RANK", xpNeeded: 0 };
    }

    // ==================== APP STATE ====================
    let currentTopic = localStorage.getItem("chem_topic") || "Experimental Chemistry";
    let currentIndex = getSavedIndex(currentTopic);
    let answered = false;
    let selectedAnswer = null;
    let waitingNext = false;
    let hadWrong = false;
    let consecutiveCorrect = getStreak();
    let pendingPrize = null;
    let showPrizes = false;
    let showShop = false;

    function getTopicQuestions() { return QUESTION_SET.filter(q => q.topic === currentTopic); }
    function getTopics() { return [...new Set(QUESTION_SET.map(q => q.topic))]; }
    function getTopicProgress(topic) { let qs = QUESTION_SET.filter(q => q.topic === topic); let done = qs.filter(q => isCompleted(q.id, topic)).length; return { total: qs.length, done }; }
    function getCurrentTitle() { let xp = getXP(); for (let i=TITLES.length-1; i>=0; i--) if (xp >= TITLES[i].minXP) return TITLES[i].title; return TITLES[0].title; }

    let hintUsedForCurrent = false;
    function buyHint() {
        if (hintUsedForCurrent) { alert("Hint already shown for this question!"); return; }
        if (spendXP(10)) {
            let q = getTopicQuestions()[currentIndex];
            alert(`💡 HINT: ${q.hint || "Read the question carefully!"}`);
            hintUsedForCurrent = true;
            recordHintBought();
            recordXPSpent(10);
        } else { alert("Not enough XP! Need 10 XP for a hint."); }
    }

    function buyHeart() {
        if (getHearts() >= 5) { alert("Hearts already full!"); return; }
        if (spendXP(30)) { setHearts(getHearts() + 1); alert("❤️ Heart restored! +1 heart."); recordXPSpent(30); }
        else { alert("Need 30 XP for a heart!"); }
    }

    function showPrizeModal(badgeId) {
        let badge = BADGES.find(b => b.id === badgeId);
        if (badge) { pendingPrize = badge; render(); }
    }

    function render() {
        let root = document.getElementById("appRoot");
        if (!root) return;
        let hearts = getHearts();
        let xp = getXP();
        let streak = getStreak();
        let title = getCurrentTitle();
        let topics = getTopics();
        let currentQuestions = getTopicQuestions();
        let progress = getTopicProgress(currentTopic);
        let allCompleted = progress.done === progress.total && progress.total > 0;
        let unlocked = getUnlockedBadges();
        let nextTitleInfo = getNextTitleInfo();

        let heartsHtml = "";
        for (let i=0; i<5; i++) heartsHtml += `<span class="heart ${i < hearts ? '' : 'lost'}">❤️</span>`;

        root.innerHTML = `
            <div class="stats-bar">
                <div class="hearts">${heartsHtml}</div>
                <div class="xp-container">⭐ ${xp} XP</div>
                <div class="streak-badge">⚡ ${streak} in a row</div>
                <div class="level-badge">${title}</div>
                ${doubleXPActive ? `<div class="doublexp-badge">⚡ 2× XP (${doubleXPQuestionsLeft} left)</div>` : ''}
                <button class="prize-btn" id="prizeBtn">🏆 Prizes ▼</button>
                <button class="shop-btn" id="shopBtn">🛒 Shop ▼</button>
            </div>
            <div class="topic-selector">
                <div class="topic-title">📚 Select Topic</div>
                <div class="topic-buttons">
                    ${topics.map(t => `<button class="topic-btn ${t === currentTopic ? 'active' : ''}" data-topic="${t}">${t} (${getTopicProgress(t).done}/${getTopicProgress(t).total})</button>`).join('')}
                </div>
            </div>
            ${showPrizes ? `
            <div class="prize-panel">
                <div class="prize-header" id="togglePrizes">
                    <strong>🏆 Your Badges (${unlocked.length}/${BADGES.length})</strong>
                    <span class="arrow">▲</span>
                </div>
                <div class="badge-container">
                    ${BADGES.map(b => `<div class="badge ${unlocked.includes(b.id) ? 'unlocked' : 'locked'}" data-tooltip="${b.tooltip}">${b.icon} ${b.name}</div>`).join('')}
                </div>
                <div class="next-title-info">
                    📍 Next Title: ${nextTitleInfo.nextTitle} ${nextTitleInfo.xpNeeded > 0 ? `(Need ${nextTitleInfo.xpNeeded} more XP)` : "(MAX RANK ACHIEVED! 🎉)"}
                </div>
            </div>` : ''}
            ${showShop ? `
            <div class="shop-panel">
                <div class="prize-header" id="toggleShop"><strong>🛒 Shop</strong><span class="arrow">▲</span></div>
                <div class="shop-items">
                    <div class="shop-item">❤️ Extra Heart<br><small>Restore 1 heart</small><br><button id="buyHeartShopBtn">30 XP</button></div>
                    <div class="shop-item">⚡ Double XP<br><small>2× XP for 5 questions</small><br><button id="doubleXPShopBtn">50 XP</button></div>
                </div>
            </div>` : ''}
            <div class="quiz-card">
                ${allCompleted ? `
                    <div style="text-align:center; padding:20px;">
                        🎉 Topic Complete! 🎉<br>
                        <button class="reset-progress" id="resetTopicBtn">⟳ Reset this topic</button>
                    </div>
                ` : `
                    <div class="question-text">${currentQuestions[currentIndex]?.text || "Loading..."}</div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div id="feedbackArea" class="feedback-area hidden"></div>
                    <button id="nextBtn" class="next-btn hidden">➡ NEXT QUESTION</button>
                    <div class="bottom-actions">
                        <button class="reset-progress" id="resetTopicBtnSmall">⟳ Reset topic</button>
                        <button class="hint-btn" id="hintBtn">💡 Hint (10 XP)</button>
                    </div>
                `}
            </div>
        `;

        if (!allCompleted && currentQuestions.length > 0) {
            let q = currentQuestions[currentIndex];
            let grid = document.getElementById("optionsGrid");
            if (grid) {
                grid.innerHTML = "";
                q.options.forEach((opt, idx) => {
                    let letter = String.fromCharCode(65+idx);
                    let btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = `${letter}. ${opt}`;
                    btn.onclick = () => handleAnswer(letter, q);
                    grid.appendChild(btn);
                });
            }
            if (answered && selectedAnswer) {
                let fb = document.getElementById("feedbackArea");
                if (fb) {
                    fb.classList.remove("hidden");
                    let isCorrect = (selectedAnswer === q.correct);
                    fb.innerHTML = `<strong>${isCorrect ? '✅ Correct!' : '❌ Oops!'}</strong><br>${q.explanation}<br>${!isCorrect ? `<small>✔️ Correct: ${q.correct}. ${q.options[q.correct.charCodeAt(0)-65]}</small>` : ''}`;
                    fb.style.borderLeftColor = isCorrect ? "#2c7a4d" : "#c24a4a";
                }
                let next = document.getElementById("nextBtn");
                if (next) { next.classList.remove("hidden"); next.onclick = () => moveToNext(q, currentQuestions); }
            } else {
                let fb = document.getElementById("feedbackArea");
                if (fb) fb.classList.add("hidden");
                let next = document.getElementById("nextBtn");
                if (next) next.classList.add("hidden");
            }
            let hintBtn = document.getElementById("hintBtn");
            if (hintBtn) hintBtn.onclick = () => buyHint();
            let resetSmall = document.getElementById("resetTopicBtnSmall");
            if (resetSmall) resetSmall.onclick = () => resetTopic();
        }

        document.querySelectorAll(".topic-btn").forEach(btn => {
            btn.onclick = () => {
                let newTopic = btn.getAttribute("data-topic");
                if (newTopic !== currentTopic) {
                    saveCurrentIndex(currentTopic, currentIndex);
                    currentTopic = newTopic;
                    localStorage.setItem("chem_topic", currentTopic);
                    currentIndex = getSavedIndex(currentTopic);
                    answered = false;
                    selectedAnswer = null;
                    waitingNext = false;
                    hadWrong = false;
                    hintUsedForCurrent = false;
                    render();
                }
            };
        });

        let prizeBtn = document.getElementById("prizeBtn");
        if (prizeBtn) prizeBtn.onclick = () => { showPrizes = !showPrizes; showShop = false; render(); };
        let shopBtn = document.getElementById("shopBtn");
        if (shopBtn) shopBtn.onclick = () => { showShop = !showShop; showPrizes = false; render(); };
        let togglePrizes = document.getElementById("togglePrizes");
        if (togglePrizes) togglePrizes.onclick = () => { showPrizes = false; render(); };
        let toggleShop = document.getElementById("toggleShop");
        if (toggleShop) toggleShop.onclick = () => { showShop = false; render(); };
        
        let buyHeartShop = document.getElementById("buyHeartShopBtn");
        if (buyHeartShop) buyHeartShop.onclick = () => buyHeart();
        let doubleXPShop = document.getElementById("doubleXPShopBtn");
        if (doubleXPShop) doubleXPShop.onclick = () => activateDoubleXP();

        let resetBig = document.getElementById("resetTopicBtn");
        if (resetBig) resetBig.onclick = () => resetTopic();
        
        if (pendingPrize) {
            let modalDiv = document.createElement("div");
            modalDiv.className = "modal";
            modalDiv.innerHTML = `<div class="modal-content"><h2>🏆 PRIZE UNLOCKED!</h2><div style="font-size:3rem;">${pendingPrize.icon}</div><h3>${pendingPrize.name}</h3><p>${pendingPrize.description}</p><button id="closeModal">Continue</button></div>`;
            root.appendChild(modalDiv);
            document.getElementById("closeModal").onclick = () => { modalDiv.remove(); pendingPrize = null; render(); };
        }
    }

    function handleAnswer(letter, question) {
        if (waitingNext || answered) return;
        if (getHearts() <= 0) { alert("💔 No hearts! Reset topic to restore."); return; }
        answered = true;
        selectedAnswer = letter;
        let isCorrect = (letter === question.correct);
        if (isCorrect) {
            consecutiveCorrect++;
            setStreak(consecutiveCorrect);
            let earned = isCompleted(question.id, question.topic) ? Math.floor(question.xp/2) : question.xp;
            let multiplier = getMultiplier();
            let finalXP = earned * multiplier;
            addXP(finalXP);
            recordCorrectAnswer();
            if (multiplier === 2) consumeDoubleXP();
            if (!isCompleted(question.id, question.topic)) {
                setCompleted(question.id, question.topic);
                checkFirstCorrect();
            }
            checkTopicMaster(question.topic, getTopicQuestions());
            if (!hadWrong) checkPerfectTopic(question.topic, getTopicQuestions(), hadWrong);
        } else {
            consecutiveCorrect = 0;
            setStreak(0);
            hadWrong = true;
            let newHearts = getHearts() - 1;
            setHearts(newHearts);
            recordHeartLoss();
            if (newHearts === 0) alert("💀 0 hearts! Reset topic to continue.");
        }
        recordQuestionAnswered();
        render();
    }

    function moveToNext(question, qlist) {
        if (waitingNext) return;
        waitingNext = true;
        if (currentIndex + 1 < qlist.length) {
            currentIndex++;
            saveCurrentIndex(currentTopic, currentIndex);
            answered = false;
            selectedAnswer = null;
            waitingNext = false;
            hintUsedForCurrent = false;
            render();
        } else {
            alert(`🎉 Completed ${currentTopic}! Keep going!`);
            currentIndex = 0;
            saveCurrentIndex(currentTopic, 0);
            answered = false;
            selectedAnswer = null;
            waitingNext = false;
            hadWrong = false;
            hintUsedForCurrent = false;
            render();
        }
    }

    function resetTopic() {
        if (confirm(`Reset all progress for ${currentTopic}? Hearts will restore to 5.`)) {
            let qs = getTopicQuestions();
            let completed = getCompleted();
            qs.forEach(q => { delete completed[`${q.id}_${q.topic}`]; });
            localStorage.setItem("chem_completed", JSON.stringify(completed));
            setHearts(5);
            consecutiveCorrect = 0;
            setStreak(0);
            hadWrong = false;
            currentIndex = 0;
            saveCurrentIndex(currentTopic, 0);
            answered = false;
            selectedAnswer = null;
            waitingNext = false;
            hintUsedForCurrent = false;
            render();
        }
    }

    setInterval(() => { let h = getHearts(); if (h < 5) { setHearts(h+1); render(); } }, 600000);
    render();
</script>
</body>
</html>
